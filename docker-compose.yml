services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: indago
      POSTGRES_PASSWORD: indago
      POSTGRES_DB: indago
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U indago"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    image: node:24-alpine
    working_dir: /app
    command: sh -c "corepack enable && pnpm install --frozen-lockfile && pnpm --filter @indago/api dev"
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://indago:indago@postgres:5432/indago
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      N8N_WEBHOOK_URL: http://n8n:5678/webhook/property-created
      PORT: "3001"
      NODE_ENV: development
      LOG_LEVEL: debug
    volumes:
      - .:/app
      - api_node_modules:/app/node_modules
      - ./apps/api/uploads:/app/uploads

  web:
    image: node:24-alpine
    working_dir: /app
    command: sh -c "corepack enable && pnpm install --frozen-lockfile && cd apps/web && npx vite --host 0.0.0.0 --port 3000"
    ports:
      - "3000:3000"
    depends_on:
      - api
    environment:
      API_PROXY_TARGET: http://api:3001
    volumes:
      - .:/app
      - web_node_modules:/app/node_modules

  n8n:
    image: n8nio/n8n:latest
    ports:
      - "5678:5678"
    depends_on:
      - api
    environment:
      N8N_HOST: 0.0.0.0
      N8N_PORT: 5678
      WEBHOOK_URL: http://localhost:5678
      N8N_DIAGNOSTICS_ENABLED: "false"
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  pgdata:
  n8n_data:
  api_node_modules:
  web_node_modules:
